unbind r
bind-key r source-file ~/.tmux.conf \; display "Reloaded!"
set -g prefix C-t
set -g status on
set -g status-interval 1
setw -g mode-keys vi
set -g mouse on

bind-key h select-pane -L
bind -n M-Left switch-client -p
bind -n M-Right switch-client -n
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind Space last-window
bind-key / split-window -h 
bind-key . split-window -v 
bind-key R run-shell "tmux command-prompt -p 'window:' 'rename-window \"%%\"'"
bind-key S run-shell "tmux command-prompt -p 'session:' 'rename-session \"%%\"'"

set -g status-style 'bg=default fg=#3e939b'
set -g message-style "bg=default,fg=#EBDBB2"
set -g status-position bottom 


# List of plugins
set -g @plugin 'tmux-plugins/tpm'

run '~/.tmux/plugins/tpm/tpm'
