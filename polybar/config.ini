[colors]
background = #000000
foreground = #e3f9fc
background-alt = #282828

primary        = #a9b665
secondary      = #7daea3
accent         = #d8a657

alert          = #ea6962
red            = #ea6962
orange         = #e78a4e
yellow         = #d8a657
green          = #a9b665
cyan           = #89b482
sky            = #7daea3
pink           = #d3869b

disabled       = #3c3836
dim            = #504945
grey           = #3c3836

[bar/bar]
underline-size = 2
override-redirect = false
wm-restack = i3
width = 100%
height = 16pt
offset-x = 10%
offset-y = 2%
radius = 0
fixed-center = true 
bottom = false


background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0
#border-color = #888789

padding-left = 0
padding-right = 1
module-margin = 1

; separator = "|"
; separator-foreground = ${colors.disabled}

font-0 = "FiraMono Nerd Font:style=Regular:size=10;2"
font-1 = "Font Awesome 7 Free:style=Regular:size=14;2"
font-2 = "Hack Nerd Font:style=Bold:pixelsize=10;2"

;modules-left = i3 pomodoro xwindow  
;modules-center =  
;modules-right = wlan battery pulseaudio memory cpu  date 

modules-left =  i3 
modules-center = 
modules-right = pulseaudio battery time wifi 

cursor-click = pointer
cursor-scroll = ns-resize

tray-position = none 
tray-padding = 2
tray-maxsize = 11
tray-scale = 1.0
tray-offset-x = 0
tray-offset-y = 0
enable-ipc = true


; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray
tray-padding = 2px
tray-size = 12
tray-spacing = 4px

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = false
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

format = <label-state> <label-mode>

label-focused =  %name% 
#label-focused = ŌŚÅ

label-focused-foreground = #000b0c
label-focused-padding = 1
;label-focused-underline = ${colors.primary}
label-focused-background = #618287

#label-unfocused = %icon%
label-unfocused = %name%
label-unfocused-background = ${colors.background}
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 1

label-visible = %name%
label-visible-underline = ${colors.foreground}
label-visible-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.blue}
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

label-urgent = %name%
#label-urgent = ŌŚÅ
label-urgent-foreground = ${colors.alert}
#label-urgent-background = #550000
label-urgent-padding = 1



[module/powermenu]
type = custom/script
exec = echo "’Ćæ"
click-left = eww open powermenu
label = ’Ćæ


[module/xworkspaces]
type = internal/xworkspaces

label-active = %icon%
label-active-foreground = #d3b17d
label-active-background = ${colors.background-alt}
#label-active-underline= ${colors.green}
label-active-padding = 1
label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.cyan}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1


label-empty = %name%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:20:...%
format = "<label>"
label-foreground = #e5e9f0
label-padding = 0


[module/filesystem]
type = internal/fs
interval = 1.5

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "[VOL] "
; format-volume-prefix = "¾░ĢŠ "
format-volume-prefix-font = 1
format-volume-prefix-foreground = ${colors.foreground}
#format-volume-prefix-foreground = ${colors.pink}
format-volume = "<label-volume>"
format-volume-padding = 0

label-volume = "%percentage%%"
#format-volume-prefix-foreground = ${colors.pink}

label-muted = "Ņ╗© "
label-muted-foreground = ${colors.dim}


[module/memory]
type = internal/memory
interval = 1
format-prefix =  "[Ņ┐ģ  "
#format-prefix =  "RAM "
format-prefix-foreground = ${colors.foreground}
#format-prefix-foreground = ${colors.red}
#underline-size = 0.5
label = "%percentage_used%%]"
label-padding = 0

[module/cpu]
type = internal/cpu
interval = 1
; format-prefix = "¾░Ā░  "
format-prefix = "CPU "
format-prefix-foreground = ${colors.foreground}
#underline-size = 0.5
label = "%percentage:2%%"
label-padding = 0

[network-base]
type = internal/network
interval = 5
format-connected = "’ć½ "  
format-disconnected = "¾░¢¬ " 
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

; Click actions
click-left = nm-connection-editor &
click-right = rofi -show network
[module/wlan]
inherit = network-base
interface-type = wireless
format-prefix = "’ć½" 
label-connected = "’ć½"
click-left = ~/scripts/wifi-menu.sh
;format-connected-underline = ${colors.purple}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/time]
type = internal/date
interval = 1
time = "%d/%m/%y %H:%M"
format = <label>
label = "%time%"
label-padding = 0

[module/date]
type = internal/date
interval = 1
date = %Y %B %d, %A
label = " %date% "

[module/songs]
type = custom/script
exec = ~/scripts/musicplaying.sh
click-left = ~/scripts/musicplaying.sh toggle
click-right = ~/.config/polybar/scripts/musicplaying.sh next
scroll-down = ~/.config/polybar/scripts/musicplaying.sh prev
interval = 1


[module/upt]
type = custom/script
interval = 120
format-prefix = "’üó "
format-prefix-foreground = ${colors.sky-blue}
exec = ~/scripts/uptime.sh

[module/pomodoro]
type = custom/script
exec = ~/scripts/pomodoro.sh
interval = 1
click-left = ~/scripts/pomodoro.sh --start
click-right = ~/scripts/pomodoro.sh --stop



[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ADP1
poll-interval = 5
time-format = %H:%M
#ramp-capacity-foreground = ${colors.green}
#animation-charging-foreground = ${colors.red}
format-charging = CHR <label-charging>
format-discharging = BAT <label-discharging>
label-charging = %percentage%%
label-discharging =  %percentage%%
label-full = Fully charged
label-low = BATTERY LOW
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
bar-capacity-width = 10
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750
animation-discharging-0 = ’ēĆ
animation-discharging-1 = ’ēü
animation-discharging-2 = ’ēé
animation-discharging-3 = ’ēā
animation-discharging-4 = ’ēä
animation-discharging-framerate = 500
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200
label-full-padding = 0
format-charging-padding = 0
format-discharging-padding = 0

[module/wifi]
type = custom/script
exec = ~/scripts/wifi-status.sh
interval = 5
click-left = ~/scripts/wifi-menu.sh
; format-prefix = ""

[settings]
screenchange-reload = true
pseudo-transparency = true

