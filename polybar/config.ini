[colors]
background = #0a0a0a
foreground = #c9c9c9
background-alt = #282828

primary        = #a9b665
secondary      = #7daea3
accent         = #d8a657

alert          = #ea6962
red            = #ea6962
orange         = #e78a4e
yellow         = #d8a657
green          = #a9b665
cyan           = #89b482
sky            = #7daea3
pink           = #d3869b

disabled       = #3c3836
dim            = #7a7a7a
grey           = #3c3836

[bar/bar]
underline-size = 2
override-redirect = false
wm-restack = i3
width = 100%
height = 17pt
offset-x = 10%
offset-y = 2%
radius = 0
fixed-center = true 
bottom = false


background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0
#border-color = #888789

padding-left = 1
padding-right = 1
module-margin = 1

separator = "|"
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:style=Regular:size=9.5;2"
font-1 = "Font Awesome 7 Free:style=Regular:size=14;2"

modules-left = lock i3 systray
modules-center = time 
modules-right = xwindow pulseaudio battery 

cursor-click = pointer
cursor-scroll = ns-resize

tray-position = left 
tray-padding = 2
tray-maxsize = 8
tray-scale = 1.0
tray-offset-x = 0
tray-offset-y = 0
enable-ipc = true

[module/systray]
type = internal/tray
tray-padding = 2px
tray-size = 15
tray-spacing = 4px

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = false
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

format = <label-state> <label-mode>

label-focused =  %name%
label-focused-foreground = #e0e0e0
label-focused-background = ${colors.background} 
label-focused-padding = 1

#label-unfocused = %icon%
label-unfocused = %name%
label-unfocused-background = ${colors.background}
label-unfocused-foreground = #666666
label-unfocused-padding = 1

label-visible = %name%
label-visible-underline = ${colors.foreground}
label-visible-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.blue}
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

label-urgent = %name%
#label-urgent = ●
label-urgent-foreground = ${colors.alert}
#label-urgent-background = #550000
label-urgent-padding = 1

[module/xworkspaces]
type = internal/xworkspaces

label-active = %icon%
label-active-foreground = #d3b17d
label-active-background = ${colors.background-alt}
#label-active-underline= ${colors.green}
label-active-padding = 1
label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.cyan}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1


label-empty = %name%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title%
label-maxlen = 25
format = "<label>"
label-foreground = #cecece
label-padding = 0

[module/lock]
type = custom/text
content = " "
content-foreground = #b0befc

click-left = i3lock -c 000000

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "  "
format-volume-prefix-foreground = ${colors.foreground}
format-volume = "<label-volume>"
format-volume-padding = 0

label-volume = "%percentage%%"
#format-volume-prefix-foreground = ${colors.pink}

label-muted = "  muted"
label-muted-foreground = ${colors.dim}


[module/memory]
type = internal/memory
interval = 1
format-prefix =  "RAM "
format-prefix-foreground = ${colors.foreground}
#underline-size = 0.5
label = "%percentage_used%%"
label-padding = 0

[module/cpu]
type = internal/cpu
interval = 1
format-prefix = "CPU "
format-prefix-foreground = ${colors.foreground}
label = "%percentage:2%%"
label-padding = 0

[module/time]
type = internal/date
interval = 1
time = "  %H:%M:%S"
time-alt = "󰃭 %d %B, %a"
format = <label>
label = "%time%"
label-padding = 0

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ADP1
poll-interval = 5
time-format = %H:%M
#ramp-capacity-foreground = ${colors.green}
#animation-charging-foreground = ${colors.red}
format-charging = CHR <label-charging>
format-discharging = BAT <label-discharging>
label-charging = %percentage%%
label-discharging =  %percentage%%
label-full = Fully charged
label-low = BATTERY LOW
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
bar-capacity-width = 10
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750
animation-discharging-0 = 
animation-discharging-1 = 
animation-discharging-2 = 
animation-discharging-3 = 
animation-discharging-4 = 
animation-discharging-framerate = 500
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200
label-full-padding = 0
format-charging-padding = 0
format-discharging-padding = 0

[settings]
screenchange-reload = true
pseudo-transparency = true

